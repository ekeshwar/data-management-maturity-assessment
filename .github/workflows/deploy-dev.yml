name: Deploy — Development

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject dev environment banner
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          python3 .github/scripts/inject_banner.py dev dist/index.html

      - name: Deploy to GitHub Pages — /dev/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: dev
          clean: true
          single-commit: false
