name: Deploy — Staging

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject staging environment banner
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          python3 .github/scripts/inject_banner.py staging dist/index.html

      - name: Deploy to GitHub Pages — /staging/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: staging
          clean: true
          single-commit: false
